  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

low:hidden; background:linear-gradient(180deg,#EFE6D4 0%,#F4ECDD 100%); border-bottom:1px solid #E7DECF;\">\n    <div style=\"position:absolute; inset-block-start:-120px; inset-inline-start:-80px; width:340px; height:340px; border-radius:50%; background:radial-gradient(circle at center,#E3D3B4 0%,rgba(227,211,180,0) 70%); pointer-events:none;\"><\u002Fdiv>\n    <div style=\"position:absolute; inset-block-end:-140px; inset-inline-end:-60px; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle at center,#DCE6D6 0%,rgba(220,230,214,0) 70%); pointer-events:none;\"><\u002Fdiv>\n    <div style=\"position:relative; max-width:1180px; margin:0 auto; padding:44px 28px 40px; text-align:center;\">\n      <div style=\"display:inline-flex; align-items:center; gap:8px; padding:6px 13px; border-radius:999px; background:rgba(255,255,255,.7); border:1px solid #E3D8C4; font-size:13px; font-weight:600; color:#6E6353; letter-spacing:.2px;\">\n        <span style=\"width:7px; height:7px; border-radius:50%; background:#5C7A5F; display:inline-block;\"><\u002Fspan>\n        נבנה ומתוחזק בידי סטודנטיות וסטודנטים לפסיכולוגיה\n      <\u002Fdiv>\n      <h1 style=\"font-family:'Rubik',sans-serif; font-weight:700; font-size:clamp(30px,4.6vw,50px); line-height:1.12; margin:20px auto 0; max-width:20ch; color:#26221C;\">\n        מאגר עבודות, התנדבויות ומלגות\n        <span style=\"display:block; color:#4B6B50;\">לסטודנטים לפסיכולוגיה<\u002Fspan>\n      <\u002Fh1>\n      <p style=\"font-size:clamp(15px,1.7vw,18px); line-height:1.65; color:#6B6153; max-width:56ch; margin:16px auto 0;\">\n        מרחב שנוצר עבורכם — כדי לעזור למצוא את מקום ההתנסות המעשית שמתאים לכם, מתוך חוויות אמיתיות של סטודנטים שכבר היו שם.\n      <\u002Fp>\n      <div style=\"display:flex; flex-wrap:wrap; gap:12px; align-items:center; justify-content:center; margin-top:26px;\">\n        <a href=\"https://docs.google.com/forms/d/e/1FAIpQLScV2F8FD9gaUv43DshUcf_R2kuuHQmNVhtFMNTV3lxGGtIR-Q/viewform\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex; align-items:center; gap:9px; background:#B5623E; color:#fff; font-weight:700; font-size:16px; padding:13px 22px; border-radius:12px; text-decoration:none; box-shadow:0 8px 20px -8px rgba(181,98,62,.6); transition:transform .15s ease, box-shadow .15s ease;\" style-hover=\"transform:translateY(-2px); box-shadow:0 12px 26px -8px rgba(181,98,62,.7);\">\n          <span style=\"font-size:19px; line-height:0;\">＋<\u002Fspan> הוסיפו מסגרת מהניסיון שלכם\n        <\u002Fa>\n        <div style=\"display:flex; align-items:center; gap:7px; font-size:14px; color:#8A8071;\">\n          <span style=\"font-weight:700; color:#4B6B50; font-size:16px;\">{{ totalLabel }}<\u002Fspan> מסגרות במאגר · מתעדכן אוטומטית\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== STICKY TOOLBAR ===== -->\n  <div style=\"position:sticky; inset-block-start:0; z-index:20; background:rgba(247,242,233,.86); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); border-bottom:1px solid #E7DECF;\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:14px 28px;\">\n      <div style=\"display:flex; flex-wrap:wrap; gap:8px; justify-content:center;\">\n        <sc-for list=\"{{ regionPills }}\" as=\"pill\" hint-placeholder-count=\"6\">\n          <button onclick=\"{{ pill.onClick }}\" style=\"{{ pill.style }}\" style-hover=\"filter:brightness(.98);\">{{ pill.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-wrap:wrap; gap:10px; margin-top:12px; align-items:center;\">\n        <div style=\"position:relative; flex:1 1 260px; min-width:220px;\">\n          <span style=\"position:absolute; inset-block-start:50%; inset-inline-start:14px; transform:translateY(-50%); color:#A99E8D; font-size:16px;\">⌕<\u002Fspan>\n          <input value=\"{{ q }}\" oninput=\"{{ onSearch }}\" placeholder=\"חיפוש לפי שם, עיר, תפקיד או אוכלוסייה…\" style=\"width:100%; padding:12px 40px 12px 14px; border:1px solid #E1D7C6; border-radius:11px; background:#fff; font-family:inherit; font-size:15px; color:#2C2822; outline:none;\" style-focus=\"border-color:#B7A98E; box-shadow:0 0 0 3px rgba(183,169,142,.18);\">\n        <\u002Fdiv>\n        <select value=\"{{ type }}\" onchange=\"{{ onType }}\" style=\"flex:0 1 160px; min-width:140px; padding:12px 14px; border:1px solid #E1D7C6; border-radius:11px; background:#fff url('data:image/svg+xml;utf8,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 viewBox=%220 0 12 12%22&gt;&lt;path d=%22M2 4l4 4 4-4%22 fill=%22none%22 stroke=%22%23A99E8D%22 stroke-width=%221.5%22/&gt;&lt;/svg&gt;') no-repeat left 14px center; font-family:inherit; font-size:15px; color:#2C2822; outline:none;\">\n          <sc-for list=\"{{ typeOptions }}\" as=\"opt\" hint-placeholder-count=\"4\"><option value=\"{{ opt.value }}\">{{ opt.label }}<\u002Foption><\u002Fsc-for>\n        <\u002Fselect>\n        <select value=\"{{ city }}\" onchange=\"{{ onCity }}\" style=\"flex:0 1 160px; min-width:140px; padding:12px 14px; border:1px solid #E1D7C6; border-radius:11px; background:#fff url('data:image/svg+xml;utf8,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 viewBox=%220 0 12 12%22&gt;&lt;path d=%22M2 4l4 4 4-4%22 fill=%22none%22 stroke=%22%23A99E8D%22 stroke-width=%221.5%22/&gt;&lt;/svg&gt;') no-repeat left 14px center; font-family:inherit; font-size:15px; color:#2C2822; outline:none;\">\n          <sc-for list=\"{{ cityOptions }}\" as=\"opt\" hint-placeholder-count=\"4\"><option value=\"{{ opt.value }}\">{{ opt.label }}<\u002Foption><\u002Fsc-for>\n        <\u002Fselect>\n        <select value=\"{{ minRating }}\" onchange=\"{{ onRating }}\" style=\"flex:0 1 150px; min-width:130px; padding:12px 14px; border:1px solid #E1D7C6; border-radius:11px; background:#fff url('data:image/svg+xml;utf8,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 viewBox=%220 0 12 12%22&gt;&lt;path d=%22M2 4l4 4 4-4%22 fill=%22none%22 stroke=%22%23A99E8D%22 stroke-width=%221.5%22/&gt;&lt;/svg&gt;') no-repeat left 14px center; font-family:inherit; font-size:15px; color:#2C2822; outline:none;\">\n          <sc-for list=\"{{ ratingOptions }}\" as=\"opt\" hint-placeholder-count=\"4\"><option value=\"{{ opt.value }}\">{{ opt.label }}<\u002Foption><\u002Fsc-for>\n        <\u002Fselect>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== RESULTS ===== -->\n  <main style=\"max-width:1180px; margin:0 auto; padding:22px 28px 64px;\">\n    <div style=\"display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:16px;\">\n      <div style=\"font-size:14px; color:#8A8071; font-weight:600;\">{{ countLabel }}<\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:8px; font-size:13px; color:#8A8071;\">\n        <span>מיון:<\u002Fspan>\n        <select value=\"{{ sort }}\" onchange=\"{{ onSort }}\" style=\"padding:7px 30px 7px 12px; border:1px solid #E1D7C6; border-radius:9px; background:#fff url('data:image/svg+xml;utf8,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2210%22 height=%2210%22 viewBox=%220 0 12 12%22&gt;&lt;path d=%22M2 4l4 4 4-4%22 fill=%22none%22 stroke=%22%23A99E8D%22 stroke-width=%221.5%22/&gt;&lt;/svg&gt;') no-repeat left 10px center; font-family:inherit; font-size:13px; color:#2C2822; outline:none;\">\n          <sc-for list=\"{{ sortOptions }}\" as=\"opt\" hint-placeholder-count=\"3\"><option value=\"{{ opt.value }}\">{{ opt.label }}<\u002Foption><\u002Fsc-for>\n        <\u002Fselect>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ loading }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px;\">\n        <sc-for list=\"{{ skeletons }}\" as=\"s\" hint-placeholder-count=\"6\">\n          <div style=\"height:150px; border-radius:16px; background:#fff; border:1px solid #ECE3D4; animation:pulseSk 1.4s ease-in-out infinite;\"><\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"text-align:center; padding:70px 20px; color:#9A9081;\">\n        <div style=\"font-size:40px; margin-bottom:10px;\">◍<\u002Fdiv>\n        <div style=\"font-family:'Rubik',sans-serif; font-size:22px; color:#5C5445; margin-bottom:6px;\">לא נמצאו מסגרות שמתאימות לסינון<\u002Fdiv>\n        <div style=\"font-size:15px;\">כדאי לנקות חלק מהמסננים או לנסות חיפוש אחר.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; align-items:start;\">\n      <sc-for list=\"{{ groups }}\" as=\"g\" hint-placeholder-count=\"0\">\n        <article style=\"background:#fff; border:1px solid #EAE0D0; border-radius:16px; overflow:hidden; box-shadow:0 1px 2px rgba(60,50,35,.04); animation:riseIn .35s ease both;\">\n          <!-- card head -->\n          <button onclick=\"{{ g.toggle }}\" style=\"all:unset; display:block; width:100%; cursor:pointer; padding:16px 17px 14px; box-sizing:border-box;\">\n            <div style=\"display:flex; justify-content:space-between; align-items:flex-start; gap:10px;\">\n              <div style=\"display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:999px; font-size:12px; font-weight:700; {{ g.typeStyle }}\">{{ g.typeLabel }}<\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:6px;\">\n                <div style=\"position:relative; display:inline-block; font-size:15px; line-height:1; letter-spacing:2px;\">\n                  <div style=\"color:#E7DDCC;\">★★★★★<\u002Fdiv>\n                  <div style=\"position:absolute; inset-block-start:0; inset-inline-start:0; overflow:hidden; white-space:nowrap; color:#D8A33C; width:{{ g.starPct }};\">★★★★★<\u002Fdiv>\n                <\u002Fdiv>\n                <span style=\"font-size:13px; font-weight:700; color:#7A6F1E;\">{{ g.ratingNum }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <h3 style=\"font-family:'Rubik',sans-serif; font-weight:700; font-size:20px; line-height:1.25; margin:12px 0 0; color:#26221C;\">{{ g.name }}<\u002Fh3>\n            <div style=\"display:flex; align-items:center; gap:6px; margin-top:7px; font-size:13.5px; color:#8A8071;\">\n              <span style=\"color:#B5623E;\">◎<\u002Fspan> {{ g.locationLabel }}\n              <span style=\"opacity:.5;\">·<\u002Fspan> {{ g.roleLabel }}\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-wrap:wrap; gap:6px; margin-top:12px;\">\n              <sc-for list=\"{{ g.popsShown }}\" as=\"pop\" hint-placeholder-count=\"3\">\n                <span style=\"font-size:12px; color:#6E6455; background:#F3ECDE; border:1px solid #EBE1CF; padding:3px 9px; border-radius:7px;\">{{ pop }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex; align-items:center; justify-content:space-between; margin-top:14px; padding-top:12px; border-top:1px solid #F0E9DB;\">\n              <span style=\"font-size:13px; font-weight:600; color:#9A9081;\">{{ g.reviewCountLabel }}<\u002Fspan>\n              <span style=\"display:inline-flex; align-items:center; gap:5px; font-size:13px; font-weight:700; color:#4B6B50;\">{{ g.toggleLabel }} <span style=\"font-size:11px; transition:transform .2s;\">{{ g.chevron }}<\u002Fspan><\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fbutton>\n\n          <!-- expanded -->\n          <sc-if value=\"{{ g.expanded }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:2px 17px 18px; border-top:1px solid #F0E9DB; background:linear-gradient(180deg,#FCFAF5,#fff);\">\n              <sc-for list=\"{{ g.reviews }}\" as=\"rev\" hint-placeholder-count=\"1\">\n                <div style=\"margin-top:16px; padding-top:16px; border-top:1px dashed #EDE4D4;\">\n                  <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:12px;\">\n                    <span style=\"width:26px; height:26px; border-radius:50%; background:#EDEFE8; color:#4B6B50; display:inline-flex; align-items:center; justify-content:center; font-size:13px; font-weight:700;\">{{ rev.badge }}<\u002Fspan>\n                    <span style=\"font-weight:700; font-size:14.5px; color:#3B352C;\">{{ rev.role }}<\u002Fspan>\n                  <\u002Fdiv>\n\n                  <sc-for list=\"{{ rev.fields }}\" as=\"f\" hint-placeholder-count=\"4\">\n                    <div style=\"margin-bottom:11px;\">\n                      <div style=\"font-size:12px; font-weight:700; color:#4B6B50; letter-spacing:.2px; margin-bottom:3px;\">{{ f.label }}<\u002Fdiv>\n                      <div style=\"font-size:14px; line-height:1.62; color:#514A3F;\">{{ f.value }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n\n                  <div style=\"margin-top:13px; display:grid; grid-template-columns:1fr 1fr; gap:9px 18px;\">\n                    <sc-for list=\"{{ rev.metrics }}\" as=\"m\" hint-placeholder-count=\"4\">\n                      <div>\n                        <div style=\"display:flex; justify-content:space-between; font-size:12px; color:#7A7062; margin-bottom:4px;\">\n                          <span>{{ m.label }}<\u002Fspan><span style=\"font-weight:700; color:#3B352C;\">{{ m.valLabel }}<\u002Fspan>\n                        <\u002Fdiv>\n                        <div style=\"height:6px; border-radius:99px; background:#EFE7D8; overflow:hidden;\">\n                          <div style=\"height:100%; width:{{ m.pct }}; border-radius:99px; background:{{ m.color }};\"><\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n\n                  <sc-if value=\"{{ rev.hasContact }}\" hint-placeholder-val=\"{{ false }}\">\n                    <a href=\"{{ rev.contactHref }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex; align-items:center; gap:7px; margin-top:14px; padding:9px 15px; border-radius:10px; background:#EDEFE8; color:#3F5B44; font-weight:700; font-size:13.5px; text-decoration:none;\" style-hover=\"background:#E4E9DD;\">\n                      <span>✆<\u002Fspan> {{ rev.contactLabel }}\n                    <\u002Fa>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Farticle>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- disclaimer -->\n    <div style=\"margin-top:34px; padding:16px 18px; background:#F2EBDC; border:1px solid #E8DECC; border-radius:12px; font-size:12.5px; line-height:1.6; color:#8A8071; text-align:center;\">\n      המידע באתר מבוסס על חוות דעת אישיות של סטודנטים בלבד ואינו מייצג עמדה רשמית של האוניברסיטה או כל גוף אחר. הכותבים אחראים באופן אישי לתוכן שמסרו. האתר מנוהל על ידי סטודנטים בהתנדבות ואינו גוף רשמי.\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    records: null, loading: true,\n    region: \"all\", type: \"all\", city: \"all\", minRating: 0, q: \"\", sort: \"rating\",\n    expanded: {}\n  };\n\n  async componentDidMount() {\n    try {\n      const m = await import(\"./data.js\");\n      this._seed = m.RECORDS;\n      this.setState({ records: m.RECORDS, loading: false });\n      this._refreshLive(m); // best-effort live refresh from the Google Sheet\n    } catch (e) {\n      this.setState({ loading: false });\n    }\n  }\n\n  async _refreshLive(m) {\n    try {\n      const url = \"https://docs.google.com/spreadsheets/d/\" + m.SHEET_ID + \"/gviz/tq?tqx=out:csv&gid=\" + m.SHEET_GID;\n      const res = await fetch(url);\n      if (!res.ok) return;\n      const rows = this._parseCsv(await res.text());\n      const recs = this._mapRows(rows);\n      if (recs.length) this.setState({ records: recs });\n    } catch (e) { /* keep seed data */ }\n  }\n\n  _parseCsv(text) {\n    const rows = []; let row = [], cur = \"\", q = false;\n    for (let i = 0; i < text.length; i++) {\n      const c = text[i];\n      if (q) {\n        if (c === '\"' && text[i + 1] === '\"') { cur += '\"'; i++; }\n        else if (c === '\"') q = false;\n        else cur += c;\n      } else {\n        if (c === '\"') q = true;\n        else if (c === \",\") { row.push(cur); cur = \"\"; }\n        else if (c === \"\\n\") { row.push(cur); rows.push(row); row = []; cur = \"\"; }\n        else if (c === \"\\r\") { /* skip */ }\n        else cur += c;\n      }\n    }\n    if (cur.length || row.length) { row.push(cur); rows.push(row); }\n    return rows;\n  }\n\n  _normType(t) {\n    t = (t || \"\").trim();\n    if (t.indexOf(\"עבודה\") > -1) return \"עבודה\";\n    if (t.indexOf(\"התנדבות\") > -1) return \"התנדבות\";\n    if (t.indexOf(\"מלגה\") > -1) return \"מלגה\";\n    return t || \"אחר\";\n  }\n\n  _mapRows(rows) {\n    const out = [];\n    for (let i = 1; i < rows.length; i++) {\n      const r = rows[i]; if (!r) continue;\n      const name = (r[1] || \"\").trim();\n      if (!name) continue;\n      out.push({\n        name, city: (r[2] || \"\").trim(), region: (r[14] || \"\").trim(),\n        pops: (r[3] || \"\").split(\",\").map(s => s.trim()).filter(Boolean),\n        type: this._normType(r[4]), role: (r[5] || \"\").trim(),\n        day: (r[6] || \"\").trim(), personal: +r[7] || 0,\n        suits: (r[8] || \"\").trim(), loved: (r[9] || \"\").trim(), difficulties: (r[10] || \"\").trim(),\n        meaningful: +r[11] || 0, development: +r[12] || 0, recommend: +r[13] || 0,\n        contact: (r[15] || \"\").trim()\n      });\n    }\n    return out;\n  }\n\n  set(k, v) { this.setState({ [k]: v }); }\n\n  typeStyle(t) {\n    if (t === \"עבודה\") return \"background:#E6EFE5; color:#3F5B44;\";\n    if (t === \"התנדבות\") return \"background:#E3EDF2; color:#3C6076;\";\n    if (t === \"מלגה\") return \"background:#F3EAD3; color:#8F6C1B;\";\n    return \"background:#EEE7DA; color:#6E6455;\";\n  }\n\n  contactHref(c, url) {\n    if (url) return url;\n    if (!c) return \"#\";\n    const digits = c.replace(/[^0-9+*]/g, \"\");\n    if (digits.length >= 3) return \"tel:\" + digits;\n    return \"#\";\n  }\n\n  renderVals() {\n    const s = this.state;\n    const recs = s.records || [];\n\n    // group by normalized framework name\n    const map = new Map();\n    for (const r of recs) {\n      // same workplace = same phone number; otherwise fall back to the (normalized) name\n      const phone = (r.contact || \"\").replace(/[^0-9]/g, \"\");\n      const key = phone.length >= 7\n        ? \"tel:\" + phone\n        : r.name.replace(/[\"'.\\u200e\\u200f]/g, \"\").replace(/\\s+/g, \" \").trim();\n      if (!map.has(key)) map.set(key, { ...r, reviews: [r], popsSet: new Set(r.pops) });\n      else { const g = map.get(key); g.reviews.push(r); r.pops.forEach(p => g.popsSet.add(p)); }\n    }\n\n    let groups = [...map.values()].map((g, gi) => {\n      const revs = g.reviews;\n      const avg = revs.reduce((a, r) => a + (r.meaningful + r.development + r.recommend) / 3, 0) / revs.length;\n      const rating = Math.round(avg * 10) / 10;\n      const pops = [...g.popsSet];\n      const expanded = !!s.expanded[g.name];\n      const id = \"g\" + gi;\n      return {\n        _rating: rating, _reviews: revs.length, _name: g.name,\n        id, name: g.name, region: g.region, city: g.city, type: g.type,\n        typeLabel: g.type, typeStyle: this.typeStyle(g.type),\n        locationLabel: [g.city, g.region].filter(Boolean).join(\" · \"),\n        roleLabel: revs.length > 1 ? revs.length + \" תפקידים\" : (revs[0].role || \"\"),\n        pops, popsShown: pops.slice(0, 5),\n        ratingNum: rating.toFixed(1), starPct: Math.max(0, Math.min(100, (rating / 5) * 100)) + \"%\",\n        reviewCountLabel: revs.length === 1 ? \"חוות דעת אחת\" : revs.length + \" חוות דעת\",\n        expanded, chevron: expanded ? \"▲\" : \"▼\",\n        toggleLabel: expanded ? \"הסתרה\" : \"פרטים מלאים\",\n        toggle: () => this.setState(st => ({ expanded: { ...st.expanded, [g.name]: !st.expanded[g.name] } })),\n        reviews: revs.map((r, ri) => {\n          const fields = [\n            { label: \"יום עבודה טיפוסי\", value: r.day },\n            { label: \"למי התפקיד מתאים\", value: r.suits },\n            { label: \"מה הכי אהבתי\", value: r.loved },\n            { label: \"הקשיים המרכזיים\", value: r.difficulties }\n          ].filter(f => f.value);\n          const mk = (label, val, color) => ({ label, valLabel: val + \"/5\", pct: (val / 5 * 100) + \"%\", color });\n          const url = r.contactUrl || null;\n          const isLink = /^https?:/i.test(r.contact) || !!url;\n          return {\n            badge: String(ri + 1), role: r.role || \"עדות\",\n            fields,\n            metrics: [\n              mk(\"קשר אישי עם המטופלים\", r.personal, \"#5C7A5F\"),\n              mk(\"עד כמה משמעותי\", r.meaningful, \"#B5623E\"),\n              mk(\"תרומה לתואר שני\", r.development, \"#4E7A94\"),\n              mk(\"ימליץ/ה לחברים\", r.recommend, \"#C99A3A\")\n            ],\n            hasContact: !!r.contact,\n            contactHref: this.contactHref(r.contact, url),\n            contactLabel: isLink ? (r.contact || \"קישור ליצירת קשר\") : r.contact\n          };\n        })\n      };\n    });\n\n    // ---- filters ----\n    const q = s.q.trim().toLowerCase();\n    groups = groups.filter(g => {\n      if (s.region !== \"all\" && (g.region || \"\").indexOf(s.region) === -1) return false;\n      if (s.type !== \"all\" && g.type !== s.type) return false;\n      if (s.city !== \"all\" && g.city !== s.city) return false;\n      if (s.minRating && g._rating < s.minRating) return false;\n      if (q) {\n        const hay = (g.name + \" \" + g.city + \" \" + g.region + \" \" + g.pops.join(\" \") + \" \" + g.reviews.map(r => r.role).join(\" \")).toLowerCase();\n        if (hay.indexOf(q) === -1) return false;\n      }\n      return true;\n    });\n\n    // ---- sort ----\n    if (s.sort === \"rating\") groups.sort((a, b) => b._rating - a._rating || b._reviews - a._reviews);\n    else if (s.sort === \"reviews\") groups.sort((a, b) => b._reviews - a._reviews || b._rating - a._rating);\n    else groups.sort((a, b) => a._name.localeCompare(b._name, \"he\"));\n\n    // ---- toolbar option lists ----\n    const regions = [\"מרכז\", \"שפלה\", \"דרום\", \"צפון\", \"ירושלים\"];\n    const regionPills = [{ v: \"all\", label: \"כל האזורים\" }, ...regions.map(r => ({ v: r, label: r }))].map(p => {\n      const active = s.region === p.v;\n      const style = \"all:unset; cursor:pointer; padding:8px 15px; border-radius:999px; font-size:14px; font-weight:600; transition:all .15s; \" +\n        (active\n          ? \"background:#4B6B50; color:#fff; box-shadow:0 4px 12px -5px rgba(75,107,80,.7);\"\n          : \"background:#fff; color:#6B6153; border:1px solid #E7DECF;\");\n      return { label: p.label, style, onClick: () => this.set(\"region\", p.v) };\n    });\n\n    const cities = [...new Set((s.records || []).map(r => r.city).filter(Boolean))].sort((a, b) => a.localeCompare(b, \"he\"));\n\n    return {\n      loading: s.loading && !s.records,\n      totalLabel: String(map.size || (s.records ? 0 : \"…\")),\n      groups, isEmpty: !s.loading && groups.length === 0,\n      skeletons: [1, 2, 3, 4, 5, 6],\n      countLabel: groups.length === 1 ? \"מסגרת אחת\" : groups.length + \" מסגרות\",\n      regionPills,\n      q: s.q, type: s.type, city: s.city, minRating: s.minRating, sort: s.sort,\n      onSearch: (e) => this.set(\"q\", e.target.value),\n      onType: (e) => this.set(\"type\", e.target.value),\n      onCity: (e) => this.set(\"city\", e.target.value),\n      onRating: (e) => this.set(\"minRating\", +e.target.value),\n      onSort: (e) => this.set(\"sort\", e.target.value),\n      typeOptions: [\n        { value: \"all\", label: \"כל הסוגים\" }, { value: \"עבודה\", label: \"עבודה\" },\n        { value: \"התנדבות\", label: \"התנדבות\" }, { value: \"מלגה\", label: \"מלגה\" }\n      ],\n      cityOptions: [{ value: \"all\", label: \"כל הערים\" }, ...cities.map(c => ({ value: c, label: c }))],\n      ratingOptions: [\n        { value: 0, label: \"כל הדירוגים\" }, { value: 5, label: \"5 כוכבים\" },\n        { value: 4, label: \"4 ומעלה\" }, { value: 3, label: \"3 ומעלה\" }\n      ],\n      sortOptions: [\n        { value: \"rating\", label: \"דירוג גבוה\" }, { value: \"reviews\", label: \"הכי הרבה חוות דעת\" },\n        { value: \"name\", label: \"לפי שם\" }\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
