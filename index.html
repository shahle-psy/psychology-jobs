<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מאגר מקומות עבודה והתנדבות | פסיכולוגיה BGU</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap');

  :root {
    --bg:        #f7f5f1;
    --surface:   #ffffff;
    --dark:      #1a1a1a;
    --mid:       #5a5248;
    --light:     #a09890;
    --accent:    #3d5a80;
    --accent2:   #7a9bbf;
    --border:    #ddd8d0;
    --label-bg:  #eee9e1;
    --header-bg: #1a1a1a;
    --header-fg: #f5f0e8;
    --radius:    10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--dark);
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  header {
    background: var(--header-bg);
    color: var(--header-fg);
    padding: 28px 20px 22px;
    text-align: center;
  }
  header h1 {
    font-size: clamp(18px, 5vw, 26px);
    font-weight: 600;
    letter-spacing: 0.3px;
    margin-bottom: 6px;
  }
  header p {
    font-size: 13px;
    color: #b0a898;
    font-weight: 300;
    margin-bottom: 14px;
  }
  .add-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: #f5f0e8;
    color: #1a1a1a;
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 9px 22px;
    border-radius: 30px;
    text-decoration: none;
    transition: background 0.2s, transform 0.15s;
  }
  .add-btn:hover { background: #fff; transform: translateY(-1px); }

  /* ── SEARCH & FILTER ── */
  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    position: sticky;
    z-index: 100;
    top: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .search-wrap {
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    padding: 10px 40px 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    font-family: 'Heebo', sans-serif;
    font-size: 15px;
    background: var(--bg);
    color: var(--dark);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--light);
    font-size: 16px;
    pointer-events: none;
  }
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filters select {
    flex: 1;
    min-width: 120px;
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    background: var(--bg);
    color: var(--dark);
    outline: none;
    cursor: pointer;
  }
  .filters select:focus { border-color: var(--accent); }
  .count-bar {
    font-size: 12px;
    color: var(--light);
    text-align: center;
  }

  /* ── CARDS ── */
  .cards {
    padding: 16px 12px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    transition: box-shadow 0.2s;
  }
  .card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.1); }

  .card-header {
    background: var(--header-bg);
    color: var(--header-fg);
    padding: 14px 16px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    user-select: none;
  }
  .card-header-text { flex: 1; }
  .card-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 3px;
  }
  .card-meta {
    font-size: 12px;
    color: #b0a898;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .card-meta span { display: flex; align-items: center; gap: 3px; }
  .chevron {
    font-size: 12px;
    color: #b0a898;
    transition: transform 0.25s;
    flex-shrink: 0;
  }
  .card.open .chevron { transform: rotate(180deg); }

  .card-body {
    display: none;
    padding: 0;
  }
  .card.open .card-body { display: block; }

  .field {
    border-bottom: 1px solid var(--border);
  }
  .field:last-child { border-bottom: none; }
  .field-label {
    background: var(--label-bg);
    padding: 5px 16px;
    font-size: 11px;
    font-weight: 600;
    color: var(--mid);
    letter-spacing: 0.3px;
  }
  .field-value {
    padding: 10px 16px;
    font-size: 14px;
    color: var(--dark);
    line-height: 1.6;
  }
  .dots {
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .dots .empty { color: var(--border); }

  /* type badge */
  .badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
  }
  .badge-work { background: #dbeafe; color: #1e40af; }
  .badge-volunteer { background: #dcfce7; color: #166534; }

  /* empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--light);
  }
  .empty-state div { font-size: 40px; margin-bottom: 12px; }

  /* loading */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--light);
    font-size: 14px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    text-align: center;
    padding: 24px;
    font-size: 12px;
    color: var(--light);
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }
</style>
</head>
<body>

<header>
  <h1>מאגר מקומות עבודה והתנדבות</h1>
  <p>לסטודנטים לפסיכולוגיה · אוניברסיטת בן גוריון</p>
  <a class="add-btn" href="https://docs.google.com/forms/d/e/1FAIpQLScV2F8FD9gaUv43DshUcf_R2kuuHQmNVhtFMNTV3lxGGtIR-Q/viewform" target="_blank">+ הוסיפי מסגרת</a>
</header>

<div class="controls">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="חיפוש לפי שם, עיר, אוכלוסייה..." autocomplete="off">
    <span class="search-icon">🔍</span>
  </div>
  <div class="filters">
    <select id="filter-city"><option value="">כל הערים</option></select>
    <select id="filter-type"><option value="">כל הסוגים</option></select>
    <select id="filter-rating">
      <option value="">כל הדירוגים</option>
      <option value="5">המלצה: ⭐⭐⭐⭐⭐</option>
      <option value="4">המלצה: 4+</option>
      <option value="3">המלצה: 3+</option>
    </select>
  </div>
  <div class="count-bar" id="count"></div>
</div>

<div class="cards" id="cards">
  <div class="loading">
    <div class="spinner"></div>
    טוען נתונים...
  </div>
</div>

<footer>מאגר מתעדכן אוטומטית · BGU Psychology</footer>

<script>
const SHEET_ID  = "1-R02UYfl8fYJFdiBC2YMwTX2xEEd41cIgZnrr2IwUxs";
const SHEET_GID = "681595581";
const CSV_URL   = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${SHEET_GID}`;
const LABELS = [
  null, // col 0 = timestamp, skip
  "שם המסגרת",
  "עיר",
  "אוכלוסייה",
  "סוג המסגרת",
  "תפקיד",
  "יום עבודה טיפוסי",
  "קשר אישי עם מטופלים",
  "למי מתאים",
  "הכי אהבתי",
  "קשיים עיקריים",
  "משמעות",
  "תרומה לתואר שני",
  "המלצה"
];

const RATING_COLS = [7, 11, 12, 13]; // cols that are 1-5

let allData = [];

function dots(n) {
  const filled = '●'.repeat(n);
  const empty  = '○'.repeat(5 - n);
  return `<span class="dots">${filled}<span class="empty">${empty}</span></span> ${n}/5`;
}

function renderCard(row, idx) {
  const name    = row[1] || "—";
  const city    = row[2] || "";
  const pop     = row[3] || "";
  const type    = row[4] || "";
  const rating  = parseInt(row[13]);
  const isWork  = type.includes("עבודה") || type.includes("שכר");

  const badgeClass = isWork ? "badge-work" : "badge-volunteer";
  const badgeText  = isWork ? "עבודה" : "התנדבות";

  let fieldsHtml = "";
  for (let f = 2; f <= 13; f++) {
    if (f === 1) continue;
    const label = LABELS[f];
    let val   = row[f] ? String(row[f]).trim() : "—";
    const n   = parseInt(val);
    if (RATING_COLS.includes(f) && !isNaN(n) && n >= 1 && n <= 5) {
      val = dots(n);
    }
    fieldsHtml += `
      <div class="field">
        <div class="field-label">${label}</div>
        <div class="field-value">${val}</div>
      </div>`;
  }

  return `
    <div class="card" id="card-${idx}">
      <div class="card-header" onclick="toggle(${idx})">
        <div class="card-header-text">
          <div class="card-title">${name}</div>
          <div class="card-meta">
            <span>📍 ${city}</span>
            <span><span class="badge ${badgeClass}">${badgeText}</span></span>
            ${!isNaN(rating) ? `<span>המלצה: ${dots(rating)}</span>` : ""}
          </div>
        </div>
        <span class="chevron">▼</span>
      </div>
      <div class="card-body">${fieldsHtml}</div>
    </div>`;
}

function toggle(idx) {
  const card = document.getElementById("card-" + idx);
  card.classList.toggle("open");
}

function render(data) {
  const container = document.getElementById("cards");
  if (!data.length) {
    container.innerHTML = `<div class="empty-state"><div>🔍</div>לא נמצאו תוצאות</div>`;
    document.getElementById("count").textContent = "";
    return;
  }
  container.innerHTML = data.map((row, i) => renderCard(row, row._idx)).join("");
  document.getElementById("count").textContent = `${data.length} מסגרות`;
}

function filterAndRender() {
  const q    = document.getElementById("search").value.trim().toLowerCase();
  const city = document.getElementById("filter-city").value;
  const type = document.getElementById("filter-type").value;
  const minR = parseInt(document.getElementById("filter-rating").value) || 0;

  const filtered = allData.filter(row => {
    const text = row.join(" ").toLowerCase();
    if (q && !text.includes(q)) return false;
    if (city && row[2] !== city) return false;
    if (type && !row[4].includes(type)) return false;
    if (minR) {
      const r = parseInt(row[13]);
      if (isNaN(r) || r < minR) return false;
    }
    return true;
  });

  render(filtered);
}

function populateFilters(data) {
  const cities = [...new Set(data.map(r => r[2]).filter(c => c && c.length <= 20))].sort();
  const cityEl = document.getElementById("filter-city");
  cities.forEach(c => {
    const o = document.createElement("option");
    o.value = c; o.textContent = c;
    cityEl.appendChild(o);
  });

  const typeEl = document.getElementById("filter-type");
  [["עבודה", "עבודה (עם שכר)"], ["התנדבות", "התנדבות"]].forEach(([val, label]) => {
    const o = document.createElement("option");
    o.value = val; o.textContent = label;
    typeEl.appendChild(o);
  });
}

async function load() {
  try {
    const res  = await fetch(CSV_URL);
    const text = await res.text();
    const rows = text.trim().split("\n").map(line => {
      const result = [];
      let cur = "", inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ""; }
        else { cur += ch; }
      }
      result.push(cur.trim());
      return result;
    });

    // skip header row, add index
    allData = rows.slice(1)
      .filter(r => r[1] && r[1].trim())
      .map((r, i) => { r._idx = i; return r; });

    populateFilters(allData);
    render(allData);
    document.getElementById("count").textContent = `${allData.length} מסגרות`;

    ["search","filter-city","filter-type","filter-rating"].forEach(id =>
      document.getElementById(id).addEventListener("input", filterAndRender)
    );
  } catch(e) {
    document.getElementById("cards").innerHTML =
      `<div class="empty-state"><div>⚠️</div>שגיאה בטעינת הנתונים. ודאי שהגיליון ציבורי.</div>`;
  }
}

load();
</script>
</body>
</html>
